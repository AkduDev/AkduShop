<?xml version="1.0" encoding="utf-8"?>
<svg version="1.1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 30 30" x="0px" y="0px">
  <defs>
    <style type="text/css">
      .bag-bg{fill:#2D2D2D;}
      .bag-handle{fill:none;stroke:#D4AF37;stroke-width:1.5;stroke-linecap:round;}
      .bag-body{fill:#D4AF37;}
      .bag-detail{fill:#2D2D2D;}
    </style>
  </defs>
  
  <!-- Background Circle -->
  <circle class="bag-bg" cx="15" cy="15" r="14"/>
  
  <!-- Bag Handle -->
  <path class="bag-handle" d="M 10 12 Q 10 7 15 7 Q 20 7 20 12"/>
  
  <!-- Bag Body -->
  <rect class="bag-body" x="8" y="12" width="14" height="11" rx="2"/>
  
  <!-- Bag Flap -->
  <path class="bag-detail" d="M 8 12 L 22 12 L 20 16 L 10 16 Z"/>
  
  <!-- Bag Clasp -->
  <circle class="bag-bg" cx="15" cy="15" r="1.5"/>
</svg>
